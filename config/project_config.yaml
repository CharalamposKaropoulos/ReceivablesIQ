dashboard:
  title: "Credit Risk and Receivables Dashboard"
  default_currency: "GBP"
  default_page_size: 50
  maximum_table_rows: 5000
  enable_excel_exports: true
  enable_chart_exports: true
  show_demo_disclaimer: true
  cache_ttl_seconds: 3600

database:
  engine: "duckdb"
  path: "data/database/credit_risk.duckdb"

application:
  environment: "development"
  log_level: "INFO"
  show_debug_information: false

pipeline:
  random_seed: 42
  num_customers: 2000
  small_num_customers: 100
  history_months: 24
  inject_data_quality_defects: true
  defect_rate: 0.03

# Demonstration models only — not production credit or collections models.
risk_model:
  weights:
    ageing: 0.30
    utilisation: 0.25
    payment: 0.20
    overdue_ratio: 0.15
    dispute: 0.10
  category_thresholds:
    # score < medium → low; < high → medium; < critical → high; else critical
    medium: 25.0
    high: 50.0
    critical: 75.0

collections_model:
  weights:
    risk: 0.35
    overdue: 0.25
    dpd: 0.20
    dispute: 0.10
    limit_breach: 0.10
  priority_thresholds:
    # score < medium → low; < high → medium; < critical → high; else critical
    medium: 25.0
    high: 50.0
    critical: 75.0
  recommended_actions:
    - immediate escalation
    - senior collections review
    - contact within 24 hours
    - standard collection contact
    - monitor
    - resolve dispute
    - consider credit hold
    - prepare insurance claim
